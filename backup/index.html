<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <header>
        <div class="weatherContainer">
        </div>
    </header>
    <main class="contents">
        <div class="clockContainer">
            <span class="clockTitle">00:00:00</span>
        </div>
        <form action="" class="nameContainer">
            <span class="nameContent"></span>
            <input type="text" class="nameTitle" placeholder="Hello! What's your name?">
        </form>
        <form action="" class="toDoAccetor">
            <input type="text" class="toDoInput" placeholder="Write a to do.">
        </form>
        <div class="toDoContainer">
        </div>
    </main>
    <footer>
        <form action="" class="bgSelectorForm">
            <input type="text" class="bgSelector" placeholder="You can choose background keyword, Type Here. Default = [Landscape]">
        </form>
    </footer>    
    <script src="src/bg.js"></script>
    <script src="src/name.js"></script>
    <script src="src/clock.js"></script>
    <script src="src/todo.js"></script>
    <script src="src/weather.js"></script>
</body>
</html>
